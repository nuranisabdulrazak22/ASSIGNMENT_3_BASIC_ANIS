{% extends 'campaign/base.html' %}
{% block content %}

        <h1 class="display-5 fw-bold text-success">Take Climate Action Now!</h1>
        <p class="col-md-8 fs-4 mx-auto text-muted">

        <a href="{% url 'register' %}" class="btn btn-success btn-lg px-4 mt-3">Join as a Volunteer</a>
    </div>
</div>
